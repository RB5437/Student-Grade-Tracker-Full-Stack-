<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Grade Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #1e3a5f, #0ea5e9); padding: 24px 32px; display: flex; align-items: center; gap: 16px; }
    .header h1 { font-size: 24px; font-weight: 600; color: white; }
    .header .badge { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 12px; color: white; }
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; text-align: center; }
    .stat-card .num { font-size: 36px; font-weight: 700; color: #38bdf8; }
    .stat-card .label { font-size: 13px; color: #94a3b8; margin-top: 4px; }
    .grid { display: grid; grid-template-columns: 340px 1fr; gap: 24px; }
    .form-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 24px; height: fit-content; }
    .form-card h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: #e2e8f0; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 14px; }
    .form-group input:focus, .form-group select:focus { outline: 2px solid #0ea5e9; border-color: #0ea5e9; }
    .btn-add { width: 100%; background: #0ea5e9; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-add:hover { background: #0284c7; }
    .table-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; overflow: hidden; }
    .table-header { padding: 16px 24px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    .table-header h2 { font-size: 16px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #0f172a; padding: 12px 20px; text-align: left; font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 14px 20px; border-top: 1px solid #1e293b; font-size: 14px; }
    tr:hover td { background: #0f172a; }
    .grade-badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .grade-a { background: #065f46; color: #6ee7b7; }
    .grade-b { background: #1e3a5f; color: #7dd3fc; }
    .grade-c { background: #451a03; color: #fde68a; }
    .grade-f { background: #450a0a; color: #fca5a5; }
    .btn-del { background: none; border: 1px solid #334155; color: #94a3b8; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .btn-del:hover { border-color: #ef4444; color: #ef4444; }
    .empty { text-align: center; padding: 48px; color: #475569; }
    .toast { position: fixed; top: 24px; right: 24px; background: #065f46; color: #6ee7b7; padding: 12px 20px; border-radius: 8px; font-size: 14px; display: none; z-index: 999; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>Student Grade Tracker</h1>
    <div style="font-size:13px; color:rgba(255,255,255,0.7); margin-top:4px;">Full Stack Docker Project — Day 31</div>
  </div>
  <div class="badge">🐳 Dockerized</div>
</div>

<div class="container">
  <div class="stats-row">
    <div class="stat-card"><div class="num" id="total-students">0</div><div class="label">Total Students</div></div>
    <div class="stat-card"><div class="num" id="avg-grade">0</div><div class="label">Average Grade</div></div>
    <div class="stat-card"><div class="num" id="top-grade">0</div><div class="label">Top Grade</div></div>
  </div>

  <div class="grid">
    <div class="form-card">
      <h2>Add Student</h2>
      <div class="form-group">
        <label>Student Name</label>
        <input type="text" id="name" placeholder="e.g. Ritik Sharma" />
      </div>
      <div class="form-group">
        <label>Subject</label>
        <select id="subject">
          <option>DevOps</option>
          <option>Linux</option>
          <option>AWS</option>
          <option>Docker</option>
          <option>Kubernetes</option>
          <option>Python</option>
          <option>Networking</option>
        </select>
      </div>
      <div class="form-group">
        <label>Grade (0-100)</label>
        <input type="number" id="grade" min="0" max="100" placeholder="e.g. 85" />
      </div>
      <button class="btn-add" onclick="addStudent()">+ Add Student</button>
    </div>

    <div class="table-card">
      <div class="table-header">
        <h2>All Students</h2>
        <span id="count-badge" style="font-size:12px; color:#64748b;">Loading...</span>
      </div>
      <div id="table-wrap">
        <div class="empty">Loading students...</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:5000'
  : '/api-backend';

async function loadStudents() {
  try {
    const res = await fetch(`${API}/api/students`);
    const students = await res.json();
    renderTable(students);
    document.getElementById('count-badge').textContent = `${students.length} records`;
  } catch(e) {
    document.getElementById('table-wrap').innerHTML = '<div class="empty">Cannot connect to backend. Is Docker running?</div>';
  }
}

async function loadStats() {
  try {
    const res = await fetch(`${API}/api/stats`);
    const s = await res.json();
    document.getElementById('total-students').textContent = s.total || 0;
    document.getElementById('avg-grade').textContent = s.avg_grade ? Math.round(s.avg_grade) : 0;
    document.getElementById('top-grade').textContent = s.top_grade || 0;
  } catch(e) {}
}

function getGradeClass(g) {
  if (g >= 90) return 'grade-a';
  if (g >= 75) return 'grade-b';
  if (g >= 50) return 'grade-c';
  return 'grade-f';
}

function getGradeLabel(g) {
  if (g >= 90) return 'A';
  if (g >= 75) return 'B';
  if (g >= 50) return 'C';
  return 'F';
}

function renderTable(students) {
  if (!students.length) {
    document.getElementById('table-wrap').innerHTML = '<div class="empty">No students yet. Add one!</div>';
    return;
  }
  document.getElementById('table-wrap').innerHTML = `
    <table>
      <thead><tr><th>#</th><th>Name</th><th>Subject</th><th>Grade</th><th>Action</th></tr></thead>
      <tbody>
        ${students.map((s,i) => `
          <tr>
            <td style="color:#475569">${i+1}</td>
            <td style="font-weight:500">${s.name}</td>
            <td style="color:#94a3b8">${s.subject}</td>
            <td><span class="grade-badge ${getGradeClass(s.grade)}">${s.grade} (${getGradeLabel(s.grade)})</span></td>
            <td><button class="btn-del" onclick="deleteStudent(${s.id})">Delete</button></td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

async function addStudent() {
  const name = document.getElementById('name').value.trim();
  const subject = document.getElementById('subject').value;
  const grade = parseInt(document.getElementById('grade').value);
  if (!name || isNaN(grade) || grade < 0 || grade > 100) {
    showToast('Please fill all fields correctly!', true);
    return;
  }
  await fetch(`${API}/api/students`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, subject, grade })
  });
  document.getElementById('name').value = '';
  document.getElementById('grade').value = '';
  showToast('Student added successfully!');
  loadStudents();
  loadStats();
}

async function deleteStudent(id) {
  await fetch(`${API}/api/students/${id}`, { method: 'DELETE' });
  showToast('Student deleted!');
  loadStudents();
  loadStats();
}

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#450a0a' : '#065f46';
  t.style.color = err ? '#fca5a5' : '#6ee7b7';
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

loadStudents();
loadStats();
setInterval(() => { loadStudents(); loadStats(); }, 30000);
</script>
</body>
</html>
